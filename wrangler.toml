name = "anthropic-watch"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
account_id = "1fd69d413d48666f9d91877fef930f98"

# Cron Trigger — poll Anthropic status every 2 minutes
[triggers]
crons = ["*/2 * * * *"]

# KV namespace for transition state (last-seen incident IDs + overall status).
# The id below is set after `wrangler kv namespace create ANTHROPIC_WATCH_STATE`.
[[kv_namespaces]]
binding = "STATE"
id = "7d91507eab034abb953ccaa894feb0b9"

[vars]
# Kill switch (per Wesley policy: paging features ship with kill switch defaulted OFF).
# Set to "true" via `wrangler secret put ANTHROPIC_WATCH_ENABLED` after smoke test passes.
ANTHROPIC_WATCH_ENABLED = "false"
# OpenRouter API base + model. Kept as vars so they're rotatable without code change.
OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"
OPENROUTER_MODEL = "google/gemini-2.5-flash"
# Alerthub Ingress URL — the Workers-shared producer endpoint.
ALERTHUB_INGRESS_URL = "https://alerthub-ingress.wesley-1fd.workers.dev/alert"
# Producer identity used in HMAC origin header + body bind check.
PRODUCER_TYPE = "proactive"
PRODUCER_ID = "anthropic-watch"
PRODUCER_VERSION = "0.1.0"
# Cross-cutting alerts channel — alerthub-fanout posts to `#${target_channel}`
# and treats "alerts" as the shared system-wide alerts channel (no mayor binding).
# This matches the convention used by selfmonitor's no-mayor alerts (selfmonitor.ts:478).
TARGET_CHANNEL = "alerts"
# Anthropic status endpoint.
STATUS_URL = "https://status.anthropic.com/api/v2/summary.json"

# Secrets bound via `wrangler secret put` (one-time, server-side):
#   OPENROUTER_API_KEY              — OpenRouter API key (gastown/prd Doppler)
#   HMAC_PROACTIVE_ANTHROPIC_WATCH  — shared with alerthub-ingress for /alert POST signing
